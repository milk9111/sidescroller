name: flying_enemy
move_speed: 1.5
follow_range: 420
attack_range: 0
attack_frames: 55
transform:
  x: 0
  y: 0
  scale_x: 1
  scale_y: 1
  rotation: 0
sprite: &flying_enemy_sprite
  use_source: false
  origin_x: 0
  origin_y: 0
collider:
  width: 30 
  height: 30
  offsetX: 9
  offsetY: 9
render_layer:
  index: 90
animation: &flying_enemy_animation
  sheet: flying_drone.png
  current: idle
  defs:
    idle:
      name: idle
      row: 0
      col_start: 0
      frame_count: 4
      frame_w: 48
      frame_h: 48
      fps: 8
      loop: true
    run:
      name: run
      row: 2
      col_start: 0
      frame_count: 4
      frame_w: 48
      frame_h: 48
      fps: 10
      loop: true
    attack:
      name: attack
      row: 1
      col_start: 0
      frame_count: 8
      frame_w: 48
      frame_h: 48
      fps: 10
      loop: false
    hit:
      name: hit
      row: 3
      col_start: 2
      frame_count: 1
      frame_w: 48
      frame_h: 48
      fps: 10
      loop: false
    death:
      name: death
      row: 4
      col_start: 0
      frame_count: 6
      frame_w: 48
      frame_h: 48
      fps: 10
      loop: false
audio:
  - name: attack
    file: enemy_attack.wav
    volume: 1.0
  - name: hit
    file: enemy_hit.wav
    volume: 1.0
  - name: death
    file: enemy_death.wav
    volume: 1.0

hitboxes: &flying_enemy_hitboxes
  - width: 42
    height: 24
    offset_x: 51
    offset_y: 32
    damage: 1
    anim: attack
    frames: [5]

hurtboxes: &flying_enemy_hurtboxes
  - width: 30
    height: 30
    offset_x: 24
    offset_y: 24

components:
  ai_tag: {}
  ai:
    move_speed: 1.5
    follow_range: 420
    attack_range: 0
    attack_frames: 55
  script:
    paths:
      - flying_enemy/constants.tengo
      - flying_enemy/idle_state.tengo
      - flying_enemy/follow_state.tengo
      - flying_enemy/attack_state.tengo
      - flying_enemy/hit_state.tengo
      - flying_enemy/death_state.tengo
      - flying_enemy/main.tengo
  knockbackable: {}
  transform:
    x: 0
    y: 0
    scale_x: 1
    scale_y: 1
    rotation: 0
  sprite: *flying_enemy_sprite
  render_layer:
    index: 90
  animation: *flying_enemy_animation
  audio:
    clips:
      - name: attack
        file: enemy_attack.wav
        volume: 1.0
      - name: hit
        file: enemy_hit.wav
        volume: 1.0
      - name: death
        file: enemy_death.wav
        volume: 0.5
  physics_body:
    width: 30
    height: 30
    offset_x: 24
    offset_y: 24
    mass: 1
    friction: 0.2
    elasticity: 0
    scale_with_transform: true
  gravity_scale:
    scale: 0
  hazard:
    width: 30
    height: 30
    offset_x: 24
    offset_y: 24
    scale_with_transform: true
  health:
    initial: 2
  hitboxes: *flying_enemy_hitboxes
  hurtboxes: *flying_enemy_hurtboxes
  collision_layer:
    category: 4
    mask: 1
  repulsion_layer:
    category: 4
    mask: 1