name: player
sprite: &player_sprite
  use_source: false
  origin_x: 0
  origin_y: 0
collider:
  width: 20
  height: 40
  offsetX: 20
  offsetY: 20
render_layer:
  index: 100
animation: &player_animation
  sheet: player_v3-Sheet.png
  current: idle
  defs:
    idle:
      name: idle 
      row: 0
      col_start: 0
      frame_count: 5
      frame_w: 64
      frame_h: 64
      fps: 12 
      loop: true
    run:
      name: run 
      row: 1
      col_start: 0
      frame_count: 8
      frame_w: 64
      frame_h: 64
      fps: 12 
      loop: true
    wall_grab:
      name: wall_grab 
      row: 2
      col_start: 0
      frame_count: 1
      frame_w: 64
      frame_h: 64
      fps: 12 
      loop: true
    attack:
      name: attack 
      row: 3
      col_start: 0
      frame_count: 6
      frame_w: 64
      frame_h: 64
      fps: 12 
      loop: false
    jump:
      name: jump 
      row: 4
      col_start: 0
      frame_count: 2
      frame_w: 64
      frame_h: 64
      fps: 12 
      loop: false
    fall:
      name: fall 
      row: 5
      col_start: 0
      frame_count: 1
      frame_w: 64
      frame_h: 64
      fps: 12 
      loop: true
    hit:
      name: hit 
      row: 6
      col_start: 0
      frame_count: 2
      frame_w: 64
      frame_h: 64
      fps: 12 
      loop: false
    death:
      name: death 
      row: 7
      col_start: 0
      frame_count: 14
      frame_w: 64
      frame_h: 64
      fps: 12 
      loop: false
    upward_attack:
      name: upward_attack 
      row: 8
      col_start: 0
      frame_count: 7
      frame_w: 64
      frame_h: 64
      fps: 12
      loop: false
    downward_attack:
      name: downward_attack 
      row: 9
      col_start: 0
      frame_count: 7
      frame_w: 64
      frame_h: 64
      fps: 12
      loop: false
    heal:
      name: heal 
      row: 10
      col_start: 0
      frame_count: 35
      frame_w: 64
      frame_h: 64
      fps: 24
      loop: false
    clamber:
      name: clamber 
      row: 11 
      col_start: 0
      frame_count: 5
      frame_w: 64
      frame_h: 64
      fps: 12
      loop: false

hitboxes: &player_hitboxes
  - width: 70
    height: 70
    offset_x: 45
    offset_y: 32
    damage: 1
    anim: attack
    frames: [3]
  - width: 60
    height: 60
    offset_x: 32
    offset_y: 25
    damage: 1
    anim: upward_attack
    frames: [4]
  - width: 60
    height: 60
    offset_x: 32
    offset_y: 25
    damage: 1
    anim: downward_attack
    frames: [4]

hurtboxes: &player_hurtboxes
  - width: 20
    height: 40
    offset_x: 30
    offset_y: 40

components:
  persistent:
    id: player
    keep_on_level_change: true
    keep_on_reload: false
  player_tag: {}
  player:
    move_speed: 4.0
    jump_speed: 4.0
    jump_hold_frames: 20
    jump_hold_boost: 0.25
    fall_multiplier: 2.0
    coyote_frames: 12
    clamber_frames: 15
    clamber_inset: 4
    wall_grab_frames: 60
    wall_slide_speed: 1.5
    wall_jump_push: 40
    wall_jump_frames: 80
    jump_buffer_frames: 12
    anchor_reel_speed: 3.5
    anchor_min_length: 24
    aim_slow_factor: 0.25
    hit_freeze_frames: 6
    damage_shake_intensity: 3
  input: {}
  player_state_machine: {}
  player_collision: {}
  inventory:
    items:
      - prefab: item_wrench.yaml
        count: 1
  knockbackable: {}
  transform:
    x: 0
    y: 0
    scale_x: 1
    scale_y: 1
    rotation: 0
  sprite: *player_sprite
  render_layer:
    index: 100
  circle_render:
    radius: 160
    width: 2
    color: "#7FD6FFFF"
    anti_alias: true
    disabled: true
  animation: *player_animation
  audio:
    clips:
      - name: run
        file: player_rolling.wav
        volume: 0.5
      - name: jump
        file: player_jump.wav
        volume: 0.5
      - name: land
        file: player_land.wav
        volume: 0.3
      - name: attack
        file: player_attack.wav
        volume: 0.5
      - name: hit
        file: player_hit.wav
        volume: 0.5
      - name: death
        file: player_death.wav
        volume: 0.8
      - name: out_of_healing
        file: out_of_healing.wav
        volume: 0.6
  physics_body:
    width: 20
    height: 40
    offset_x: 30
    offset_y: 40
    lock_rotation: true
    mass: 1
    friction: 0
    elasticity: 0
    scale_with_transform: true
  health:
    initial: 10
  hitboxes: *player_hitboxes
  hurtboxes: *player_hurtboxes
  collision_layer:
    category: 2
    mask: 1
