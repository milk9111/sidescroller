name: scrap_bot
sprite: &scrap_bot_sprite
  use_source: false
  origin_x: 0
  origin_y: 0
animation: &scrap_bot_animation
  sheet: scrap_bot-Sheet.png
  current: idle
  defs:
    idle:
      name: idle
      row: 0
      col_start: 0
      frame_count: 8
      frame_w: 96
      frame_h: 96
      fps: 16
      loop: true
    move:
      name: move
      row: 1
      col_start: 0
      frame_count: 11
      frame_w: 96
      frame_h: 96
      fps: 12
      loop: true
    attack:
      name: attack
      row: 2
      col_start: 0
      frame_count: 26
      frame_w: 96
      frame_h: 96
      fps: 12
      loop: false
    hit:
      name: hit
      row: 3
      col_start: 0
      frame_count: 2
      frame_w: 96
      frame_h: 96
      fps: 6
      loop: false
    death:
      name: death
      row: 4
      col_start: 0
      frame_count: 19
      frame_w: 96
      frame_h: 96
      fps: 12
      loop: false

# Combat boxes for enemy
hitboxes: &scrap_bot_hitboxes
  - width: 64
    height: 64
    offset_x: 64
    offset_y: 54
    damage: 1
    anim: attack
    frames: [18]

hurtboxes: &scrap_bot_hurtboxes
  - width: 40
    height: 40
    offset_x: 48
    offset_y: 48

components:
  ai_tag: {}
  ai:
    move_speed: 1.5
    follow_range: 400
    attack_range: 40
    attack_frames: 65
  script:
    paths:
      - scrap_bot/constants.tengo
      - scrap_bot/idle_state.tengo
      - scrap_bot/wander_state.tengo
      - scrap_bot/follow_state.tengo
      - scrap_bot/attack_state.tengo
      - scrap_bot/hit_state.tengo
      - scrap_bot/death_state.tengo
      - scrap_bot/main.tengo
  pathfinding:
    grid_size: 32
    repath_frames: 15
    debug_node_size: 3
  knockbackable: {}
  transform:
    x: 0
    y: 0
    scale_x: 1
    scale_y: 1
    rotation: 0
  sprite: *scrap_bot_sprite
  render_layer:
    index: 90
  animation: *scrap_bot_animation
  audio:
    clips:
      - name: attack
        file: enemy_attack.wav
        volume: 1.0
      - name: hit
        file: enemy_hit.wav
        volume: 1.0
      - name: death
        file: enemy_death.wav
        volume: 1.0
  physics_body:
    width: 40
    height: 90
    offset_x: 48
    offset_y: 46
    mass: 1
    friction: 0.2
    elasticity: 0
    scale_with_transform: true
  health:
    initial: 2
  hitboxes: *scrap_bot_hitboxes
  hurtboxes: *scrap_bot_hurtboxes
  hazard:
    width: 40
    height: 40
    offset_x: 48
    offset_y: 48
    scale_with_transform: true
  ai_navigation: {}
  collision_layer:
    category: 4
    mask: 1
  repulsion_layer:
    category: 4
    mask: 1