name: enemy_dumb
move_speed: 2.5
follow_range: 400
attack_range: 25
attack_frames: 65
transform:
  x: 0
  y: 0
  scale_x: 1
  scale_y: 1
  rotation: 0
sprite: &enemy_sprite
  use_source: false
  origin_x: 0
  origin_y: 0
  center_origin_if_zero: false
animation: &enemy_animation
  sheet: dumb_enemy_v2-Sheet.png
  current: idle
  playing: true
  defs:
    idle:
      row: 0
      col_start: 0
      frame_count: 1
      frame_w: 64
      frame_h: 64
      fps: 8
      loop: true
    move:
      row: 1
      col_start: 0
      frame_count: 1  
      frame_w: 64
      frame_h: 64
      fps: 8
      loop: true
    death:
      row: 2
      col_start: 0
      frame_count: 9  
      frame_w: 64
      frame_h: 64
      fps: 8
      loop: false

hurtboxes: &enemy_hurtboxes
  - width: 32
    height: 32
    offset_x: 32
    offset_y: 32

components:
  ai_tag: {}
  ai:
    move_speed: 1.25
  script:
    paths:
      - enemy_dumb/constants.tengo
      - enemy_dumb/move_state.tengo
      - enemy_dumb/death_state.tengo
      - enemy_dumb/hit_state.tengo
      - enemy_dumb/main.tengo
  knockbackable: {}
  transform:
    x: 0
    y: 0
    scale_x: 1
    scale_y: 1
    rotation: 0
  sprite: *enemy_sprite
  render_layer:
    index: 90
  animation: *enemy_animation
  audio:
    clips:
      - name: attack
        file: enemy_attack.wav
        volume: 1.0
      - name: hit
        file: enemy_hit.wav
        volume: 1.0
      - name: death
        file: enemy_death.wav
        volume: 1.0
  physics_body:
    width: 32
    height: 32
    offset_x: 32
    offset_y: 32
    mass: 1
    friction: 0.2
    elasticity: 0
    scale_with_transform: true
  health:
    initial: 2
  hurtboxes: *enemy_hurtboxes
  hazard:
    width: 32
    height: 32
    offset_x: 32
    offset_y: 32
    scale_with_transform: true
  ai_navigation: {}
  collision_layer:
    category: 4
    mask: 1
  repulsion_layer:
    category: 4
    mask: 1