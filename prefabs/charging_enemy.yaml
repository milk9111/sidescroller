name: charging_enemy
sprite: &enemy_sprite
  use_source: false
  origin_x: 0
  origin_y: 0
animation: &enemy_animation
  sheet: charging_enemy-Sheet.png
  current: idle
  defs:
    idle:
      name: idle
      row: 0
      col_start: 0
      frame_count: 8
      frame_w: 64
      frame_h: 64
      fps: 8
      loop: true
    move:
      name: move
      row: 1
      col_start: 0
      frame_count: 1
      frame_w: 64
      frame_h: 64
      fps: 8
      loop: true
    charge:
      name: charge
      row: 2
      col_start: 0
      frame_count: 1
      frame_w: 64
      frame_h: 64
      fps: 10
      loop: true
    hit:
      name: hit
      row: 3
      col_start: 0
      frame_count: 1
      frame_w: 64
      frame_h: 64
      fps: 6
      loop: false
    death:
      name: death
      row: 4
      col_start: 0
      frame_count: 8
      frame_w: 64
      frame_h: 64
      fps: 10
      loop: false
hitboxes: &enemy_hitboxes
  - width: 48
    height: 24
    offset_x: 54
    offset_y: 32
    damage: 1
    anim: attack
    frames: [10]
hurtboxes: &enemy_hurtboxes
  - width: 32
    height: 40
    offset_x: 31
    offset_y: 35

components:
  ai_tag: {}
  ai:
    move_speed: 2.5
    follow_range: 400
    attack_range: 150
    attack_frames: 65
  script:
    paths:
      - charging_enemy/constants.tengo
      - charging_enemy/idle_state.tengo
      - charging_enemy/wander_state.tengo
      - charging_enemy/move_state.tengo
      - charging_enemy/charge_state.tengo
      - charging_enemy/death_state.tengo
      - charging_enemy/hit_state.tengo
      - charging_enemy/main.tengo
  pathfinding:
    grid_size: 32
    repath_frames: 15
    debug_node_size: 3
  knockbackable: {}
  transform:
    x: 0
    y: 0
    scale_x: 1
    scale_y: 1
    rotation: 0
  sprite: *enemy_sprite
  render_layer:
    index: 90
  animation: *enemy_animation
  audio:
    clips:
      - name: hit
        file: enemy_hit.wav
        volume: 1.0
      - name: death
        file: enemy_death.wav
        volume: 1.0
      - name: move 
        file: charging_enemy_move.wav
        volume: 0.5
      - name: charge
        file: charging_enemy_charge.wav
        volume: 0.5
  physics_body:
    width: 32
    height: 40
    offset_x: 31
    offset_y: 35
    mass: 1
    friction: 0.2
    elasticity: 0
    scale_with_transform: true
  health:
    initial: 2
  hitboxes: *enemy_hitboxes
  hurtboxes: *enemy_hurtboxes
  hazard:
    width: 32
    height: 40
    offset_x: 31
    offset_y: 35
    scale_with_transform: true
  ai_navigation: {}
  collision_layer:
    category: 4
    mask: 1
  repulsion_layer:
    category: 4
    mask: 1