name: dump_market
components:
  transform:
    x: 0
    y: 0
    scale_x: 1
    scale_y: 1
    rotation: 0
  sprite:
    disabled: false
    image: market_1.png
    center_origin_if_zero: true
  script:
    paths:
      - dump_market/main.tengo
  animation:
    sheet: market_1-Sheet.png
    current: idle
    defs:
      idle:
        name: idle 
        row: 0
        col_start: 0
        frame_count: 1
        frame_w: 256
        frame_h: 256
        fps: 12 
        loop: true
      opening_eyes:
        name: opening_eyes
        row: 1
        col_start: 0
        frame_count: 3
        frame_w: 256
        frame_h: 256
        fps: 12 
        loop: false
      open_eyes:
        name: open_eyes
        row: 2
        col_start: 0
        frame_count: 1
        frame_w: 256
        frame_h: 256
        fps: 12 
        loop: true
      blinking:
        name: blinking
        row: 3
        col_start: 0
        frame_count: 6
        frame_w: 256
        frame_h: 256
        fps: 16 
        loop: false
      closing_eyes:
        name: closing_eyes
        row: 4
        col_start: 0
        frame_count: 3
        frame_w: 256
        frame_h: 256
        fps: 12 
        loop: false
  render_layer:
    index: 90
