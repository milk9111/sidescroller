name: auto_spider
components:
  ai_tag: {}
  ai:
    move_speed: 1
    follow_range: 400
    attack_range: 150
    attack_frames: 65
  script:
    paths:
      - auto_spider/constants.tengo
      - auto_spider/attack_state.tengo
      - auto_spider/death_state.tengo
      - auto_spider/follow_state.tengo
      - auto_spider/hit_state.tengo
      - auto_spider/idle_state.tengo
      - auto_spider/main.tengo
  animation:
    sheet: auto_spider-Sheet.png
    current: idle
    defs:
      idle:
        name: idle 
        row: 0
        col_start: 0
        frame_count: 4
        frame_w: 64
        frame_h: 64
        fps: 12 
        loop: true
      jump:
        name: jump 
        row: 1
        col_start: 0
        frame_count: 6
        frame_w: 64
        frame_h: 64
        fps: 12 
        loop: false
      move:
        name: move 
        row: 2
        col_start: 0
        frame_count: 3
        frame_w: 64
        frame_h: 64
        fps: 12 
        loop: true
      death:
        name: death 
        row: 3
        col_start: 0
        frame_count: 9
        frame_w: 64
        frame_h: 64
        fps: 12 
        loop: false
  # pathfinding:
  #   grid_size: 32
  #   repath_frames: 15
  #   debug_node_size: 3
  physics_body:
    width: 32
    height: 40
    offset_x: 31
    offset_y: 35
    mass: 1
    friction: 0.2
    elasticity: 0
    scale_with_transform: true
  transform:
    x: 0
    y: 0
    scale_x: 0.5
    scale_y: 0.5
    rotation: 0
  sprite: 
      use_source: false
      origin_x: 0
      origin_y: 0
  render_layer:
    index: 90
  audio:
    clips:
      - name: attack
        file: enemy_attack.wav
        volume: 1.0
      - name: hit
        file: auto_spider_hit.wav
        volume: 1.0
      - name: death
        file: enemy_death.wav
        volume: 1.0
      - name: jump 
        file: auto_spider_jump.wav
        volume: 0.5
  health:
    initial: 2
  hurtboxes:
    - width: 32
      height: 40
      offset_x: 31
      offset_y: 35  
  hazard:
    width: 24
    height: 24
    offset_x: 31
    offset_y: 35
    scale_with_transform: true
  collision_layer:
    category: 4
    mask: 1
  repulsion_layer:
    category: 4
    mask: 1